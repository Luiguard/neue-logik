<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Aether Web Synthese</title>
<style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, var(--bg-color));
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; width: 100%; box-sizing: border-box; }
        
header { padding: 2rem 0; text-align: center; font-size: 2rem; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
nav { display: flex; gap: 2rem; margin-bottom: 2rem; padding: 1rem; border-radius: 12px; } a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: color 0.3s ease; } a:hover { color: var(--accent); }
.grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
.glass-card { padding: 2rem; border-radius: 16px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s; display: flex; flex-direction: column; gap: 1rem; } .glass-card:hover { transform: translateY(-5px); } button { background: var(--accent); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.3s; } button:hover { opacity: 0.8; }
.glass-nav, .glass-card, .glass-footer { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
</style>
</head>
<body>
<div class='container'>
<header class='fade-in'><h1>NEUE LOGIK</h1><p>Synthesized interface</p></header>
<nav class='glass-nav'><a href='#'>Home</a><a href='#'>System</a><a href='#'>Core</a></nav>

<h3>Node</h3>
<p>Active state sequence.</p>
<button>Action</button>
</div>

</body>
</html>
